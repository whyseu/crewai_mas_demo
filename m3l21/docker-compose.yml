services:
  pgvector:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: xiaopaw_memory
      POSTGRES_USER: xiaopaw
      POSTGRES_PASSWORD: xiaopaw123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql  # 💡 核心点：容器首次启动自动建表

volumes:
  pgdata:
